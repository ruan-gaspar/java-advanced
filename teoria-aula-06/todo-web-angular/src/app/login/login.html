<form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

  <h2>Login</h2>

  <input
    type="text"
    formControlName="username"
    placeholder="Usuário"
  />

  <input
    type="password"
    formControlName="password"
    placeholder="Senha"
  />

  <button type="submit">Entrar</button>

</form>
