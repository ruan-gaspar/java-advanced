<div class="flex flex-col bg-slate-800 rounded-lg overflow-hidden max-w-60 shadow-lg">
  <img [src]="pet().imageUrl" [alt]="pet().name" class="h-48 object-cover">
  <div class="flex flex-col p-4">
    <span class="font-bold text-indigo-300 text-xl">{{pet().name }}</span>
    <span class="text-sm">Idade: {{pet().age }} anos</span>
  </div>
</div>
