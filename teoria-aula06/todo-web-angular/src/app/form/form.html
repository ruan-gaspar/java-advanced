<h1 class="text-lg font-semibold mb-6">
  Cadastrar Tarefa
</h1>
<form class="flex flex-col">
  <label for="description">
    Descrição:
  </label>
  <input [formControl]="description" type="text" id="description" class="p-2 border-slate-300 border-2 rounded" />
  <button type="submit" class="bg-emerald-500 text-white p-2 mt-4 rounded">
    Cadastrar Tarefa
  </button>
</form>

<label> {{description.value}}</label>
