spring:
  application:
    name: API-de-Doguinhos

  datasource:
    url: jdbc:posgresql://localhost:5432/petshop_db
    username: admin
    password: secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
      show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

